task_name: stroop
display_name: "Stroop"

stimulus:
  word_height: 0.15
  fixation_height: 0.1

colors:
  rouge: [1.0, -1.0, -1.0]
  bleu:  [-1.0, -1.0, 1.0]
  vert:  [-1.0, 0.8, -1.0]

color_words:
  rouge: "ROUGE"
  bleu:  "BLEU"
  vert:  "VERT"

neutral_words: ["XXXX", "%%%%", "OOOO"]

incongruent_pairs:
  - { word: "ROUGE", ink: "bleu" }
  - { word: "ROUGE", ink: "vert" }
  - { word: "BLEU",  ink: "rouge" }
  - { word: "BLEU",  ink: "vert" }
  - { word: "VERT",  ink: "rouge" }
  - { word: "VERT",  ink: "bleu" }

# ── Response mode ────────────────────────────────────────────────────
# "manual" = button press (default)
# "vocal"  = spoken response + continuous mic recording
response_mode: manual

# ── Manual response keys ────────────────────────────────────────────
response_keys_pc:
  rouge: "left"
  bleu:  "down"
  vert:  "right"

response_keys_fmri:
  rouge: "b"
  bleu:  "y"
  vert:  "g"

# ── Visual indicators (circles, no text) ────────────────────────────
indicator_radius: 0.03
indicator_y: -0.85
indicator_spacing: 0.25
# Order: rouge, bleu, vert (left to right)

# ── Microphone (vocal mode) ─────────────────────────────────────────
mic_sample_rate: 44100

ttl_codes:
  stim_congruent: 110
  stim_incongruent: 111
  stim_neutral: 112
  response_correct: 160
  response_incorrect: 161
  block_neutral: 20
  block_incongruent: 21
  block_congruent: 22

designs:

  1:
    name: "Initial 15x10 (~7min20)"
    paradigm: block
    fixation_duration: 0.5
    stim_duration: 1.2
    iti_duration: 0.3
    rest_duration: 10.0
    instruction_duration: 3.0
    pre_block_fixation: 0.0
    blocks:
      - { condition: neutral,      n_trials: 10 }
      - { condition: congruent,    n_trials: 10 }
      - { condition: incongruent,  n_trials: 10 }
      - { condition: neutral,      n_trials: 10 }
      - { condition: congruent,    n_trials: 10 }
      - { condition: incongruent,  n_trials: 10 }
      - { condition: neutral,      n_trials: 10 }
      - { condition: congruent,    n_trials: 10 }
      - { condition: incongruent,  n_trials: 10 }
      - { condition: neutral,      n_trials: 10 }
      - { condition: congruent,    n_trials: 10 }
      - { condition: incongruent,  n_trials: 10 }
      - { condition: neutral,      n_trials: 10 }
      - { condition: congruent,    n_trials: 10 }
      - { condition: incongruent,  n_trials: 10 }

